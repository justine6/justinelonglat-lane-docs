name: Hero Guardrails

on:
  pull_request:
    paths:
      - "partials/heroes/**"
      - "pages/**"
      - "public/**"

jobs:
  validate-heroes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run hero validation
        run: node ./scripts/check-heroes.mjs