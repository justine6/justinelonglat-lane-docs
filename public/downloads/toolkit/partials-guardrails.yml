name: Partials Guardrails

on:
  pull_request:
    paths:
      - "partials/**"
      - "pages/**"
      - "public/**"
      - "scripts/**"

jobs:
  validate-partials:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run partials validation
        run: node ./scripts/check-partials.mjs